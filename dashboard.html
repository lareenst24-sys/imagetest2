<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <div class="dashboard-shell">
    <header class="topbar">
      <div>
        <h1 class="brand">Dashboard</h1>
        <p class="top-sub">Upload and manage your images</p>
      </div>

      <button id="profileBtn" class="profile-btn">Profile</button>
    </header>

    <section class="top-grid">
      <div class="glass-card stat-card">
        <p class="card-label">Uploads Today</p>
        <h2 id="uploadCount">0 / 1000</h2>
        <p class="muted-text">Daily free limit</p>
      </div>

      <div class="glass-card desc-card">
        <p class="card-label">Description</p>
        <textarea id="descriptionInput" placeholder="#tags description..."></textarea>
      </div>

      <div class="glass-card upload-card">
        <p class="card-label">Upload Image</p>

        <label for="imageInput" class="file-label">Choose Image</label>
        <input type="file" id="imageInput" accept="image/*" />

        <p id="fileName" class="file-name">No file selected</p>

        <button id="uploadBtn" class="primary-btn">Upload Now</button>
      </div>
    </section>

    <section class="gallery-card glass-card">
      <div class="gallery-head">
        <h3>Your Images</h3>
        <p class="muted-text">Uploaded images will appear here</p>
      </div>

      <div id="imageGrid" class="image-grid">
        <div class="empty-state">
          <p>No images yet</p>
        </div>
      </div>
    </section>
  </div>

  <div id="profileModal" class="modal-overlay hidden">
    <div class="modal-box">
      <button id="closeProfileBtn" class="modal-close">&times;</button>
      <h2>Profile</h2>
      <p id="profileEmail" class="profile-email">Loading...</p>
      <button id="logoutBtn" class="danger-btn">Logout</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="dashboard.js"></script>
</body>
</html>
