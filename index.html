<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth Page</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #1a1a1a;
  padding: 30px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
  box-shadow: 0 0 20px rgba(128, 0, 255, 0.5);
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 8px;
  outline: none;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: purple;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #b300ff;
}

.switch {
  margin-top: 10px;
  cursor: pointer;
  color: #aaa;
}

.google {
  background: #333;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="login">
    <h2>Login</h2>
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">
    <button>Login</button>
    <button class="google">Continue with Google</button>
    <p class="switch" onclick="showSignup()">Don't have an account? Sign up</p>
  </div>

  <!-- SIGNUP -->
  <div id="signup" style="display:none;">
    <h2>Sign Up</h2>
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">
    <button>Sign Up</button>
    <button class="google">Continue with Google</button>
    <p class="switch" onclick="showLogin()">Already have an account? Login</p>
  </div>

</div>

<script>
function showSignup() {
  document.getElementById("login").style.display = "none";
  document.getElementById("signup").style.display = "block";
}

function showLogin() {
  document.getElementById("signup").style.display = "none";
  document.getElementById("login").style.display = "block";
}
</script>

</body>
</html>
