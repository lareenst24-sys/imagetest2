<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile • Eanova</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>

<body>

  <!-- Background -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div

  <div class="dashboard-container">

    <!-- TOP NAV -->
    <div class="topbar">
      <h2>Profile</h2>

      <div class="nav-tabs">
        <button class="nav-tab">Dashboard</button>
        <button class="nav-tab">Monetisation</button>
        <button class="nav-tab active">Profile</button>
      </div>
    </div>

    <!-- CREATOR IDENTITY -->
    <div class="glass-card">
      <div class="profile-header">
        
        <div class="avatar" data-creator-initial>
          A
        </div>

        <div>
          <p class="card-label">CREATOR IDENTITY</p>
          <h2 data-creator-name>Creator</h2>
          <p data-creator-email>email@example.com</p>
        </div>

      </div>
    </div>

    <!-- CREATOR STATS -->
    <div class="glass-card">
      <div class="card-topline">
        <p class="card-label">Creator Stats</p>
        <span class="soft-pill">Premium</span>
      </div>

      <div class="stats-grid">

        <div class="stat-box">
          <p>Today</p>
          <h2 data-lifetime-uploads>0</h2>
        </div>

        <div class="stat-box">
          <p>This Month</p>
          <h2 data-month-uploads>0</h2>
        </div>

      </div>
    </div>

    <!-- ABOUT & SUPPORT -->
    <div class="glass-card">
      <div class="card-topline">
        <p class="card-label">About & Support</p>
        <span class="soft-pill">Info</span>
      </div>

      <div class="support-clean">

        <div class="support-item">
          <span class="support-label">Email</span>
          <span class="support-value">support@eanova.online</span>
        </div>

        <div class="support-item">
          <span class="support-label">Legal</span>
          <div class="support-links">
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms</a>
            <a href="payment.html">Payment Policy</a>
            <a href="data.html">Data Notice</a>
          </div>
        </div>

      </div>
    </div>

    <!-- ACCOUNT BUTTON -->
    <div style="margin-top: 20px;">
      <button id="accountActionBtn" class="ghost-btn">Account</button>
    </div>

  </div>

  <!-- ACCOUNT MODAL -->
  <div id="accountModal" class="modal hidden">
    <div class="modal-box">
      <h3>Account Options</h3>
      <p>Manage your account</p>

      <div class="modal-actions">
        <button id="modalLogout" class="primary-btn">Log Out</button>
        <button id="modalDelete" class="danger-btn">Deactivate</button>
      </div>

      <button id="closeAccountModal" class="ghost-btn">Cancel</button>
    </div>
  </div>

  <!-- SCRIPT -->
  <script src="dashboard.js"></script>

</body>
</html>
