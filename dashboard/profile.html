<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eanova Profile</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-grid"></div>

  <div class="dashboard-shell">
    <header class="topbar">
      <div class="brand-wrap">
        <div class="brand-mark">E</div>
        <div>
          <p class="eyebrow">CREATOR DASHBOARD</p>
          <h1 class="brand">Eanova</h1>
          <p class="top-sub">Your creator profile</p>
        </div>
      </div>
    </header>

    <nav class="dashboard-nav glass-card">
      <button class="nav-tab" type="button">
        <span class="nav-icon">⌂</span>
        <span>Dashboard</span>
      </button>
      <button class="nav-tab" type="button">
        <span class="nav-icon">◈</span>
        <span>Monetisation</span>
      </button>
      <button class="nav-tab active" type="button">
        <span class="nav-icon">◉</span>
        <span>Profile</span>
      </button>
    </nav>

    <section class="profile-shell">
      <div class="glass-card">
        <div class="profile-card-main">
          <div class="profile-avatar" data-creator-initial>A</div>

          <div class="profile-main-copy">
            <h2 id="profileName" data-creator-name>Creator</h2>
            <p id="profileEmail" data-creator-email>email@example.com</p>
          </div>

          <div class="profile-status-pill" id="profileStatus">Active</div>
        </div>
      </div>

      <div class="glass-card">
        <div class="card-topline">
          <p class="card-label">Profile Details</p>
        </div>

        <div class="profile-details-grid">
          <div class="detail-box">
            <label>Name</label>
            <strong id="profileNameMirror" data-creator-name>Creator</strong>
          </div>

          <div class="detail-box">
            <label>Email</label>
            <span id="profileEmailMirror" data-creator-email>email@example.com</span>
          </div>

          <div class="detail-box">
            <label>Joined</label>
            <span id="profileJoinDate">—</span>
          </div>

          <div class="detail-box">
            <label>Account Status</label>
            <span>Active</span>
          </div>
        </div>
      </div>

      <div class="glass-card">
        <div class="card-topline">
          <p class="card-label">Creator Stats</p>
          <span class="soft-pill">Premium</span>
        </div>

        <div class="clean-two-col">
          <div class="clean-stat-tile">
            <span class="clean-stat-title">Lifetime Uploads</span>
            <strong data-lifetime-uploads>0</strong>
          </div>

          <div class="clean-stat-tile">
            <span class="clean-stat-title">This Month</span>
            <strong data-month-uploads>0</strong>
          </div>
        </div>
      </div>

      <div class="glass-card">
        <div class="card-topline">
          <p class="card-label">Support</p>
          <span class="soft-pill">Help</span>
        </div>

        <div class="profile-form-grid">
          <div class="profile-field">
            <label for="profileBusinessEmail">Business Email</label>
            <input
              type="email"
              id="profileBusinessEmail"
              placeholder="support@yourbrand.com"
            />
          </div>

          <div class="profile-field">
            <label for="profileInstagram">Instagram</label>
            <input
              type="text"
              id="profileInstagram"
              placeholder="@yourhandle"
            />
          </div>

          <div class="profile-field full">
            <label for="profileBio">Short Note</label>
            <textarea
              id="profileBio"
              placeholder="Add a short creator note or business contact info."
            ></textarea>
          </div>
        </div>

        <div class="profile-actions">
          <button id="saveProfileBtn" class="primary-btn" type="button">Save Details</button>
          <button id="logoutBtn" class="ghost-btn" type="button">Log Out</button>
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="dashboard.js"></script>
</body>
</html>
