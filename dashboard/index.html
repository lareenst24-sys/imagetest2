<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eanova Dashboard</title>
  <link rel="stylesheet" href="dashboard.css"/>
</head>
<body>

<div class="dashboard-shell">

  <!-- TOP -->
  <header class="topbar">
    <h1>Eanova</h1>
    <button id="profileBtn">Profile</button>
  </header>

  <!-- EARNINGS -->
  <section class="glass-card">
    <h2>Your Earnings</h2>

    <div class="earnings-grid">
      <div>
        <p>Total</p>
        <h3 id="totalEarnedValue">$0.00</h3>
      </div>
      <div>
        <p>Pending</p>
        <h3 id="pendingEarnedValue">$0.00</h3>
      </div>
      <div>
        <p>Paid</p>
        <h3 id="paidEarnedValue">$0.00</h3>
      </div>
    </div>

    <!-- CLAIM SECTION -->
    <div class="claim-box">
      <p>Available Balance</p>
      <h2 id="claimableBalance">$0.00</h2>

      <button id="claimGiftCardBtn">Claim Reward</button>

      <small>Minimum payout: $10 • Sent to email</small>
    </div>
  </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="dashboard.js"></script>
</body>
</html>
