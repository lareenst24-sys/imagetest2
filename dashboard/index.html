<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eanova Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <div class="dashboard-page">

    <div class="dashboard-shell">

      <!-- TOP BAR -->
      <header class="top-bar card">
        <div class="top-left">
          <div class="logo-box">E</div>
          <div class="top-text">
            <p class="eyebrow">CREATOR DASHBOARD</p>
            <h1>Eanova</h1>
            <p class="sub-text">Welcome back</p>
          </div>
        </div>

        <div class="top-right">
          <button class="ghost-btn">Dashboard</button>
          <button class="ghost-btn">Monetisation</button>
          <button class="profile-btn">Profile</button>
        </div>
      </header>

      <!-- MAIN CONTENT -->
      <main class="main-grid">

        <!-- UPLOAD CARD -->
        <section class="card upload-card">
          <div class="section-head">
            <p class="eyebrow">UPLOADS</p>
            <span class="status-pill">One Full Block</span>
          </div>

          <div class="upload-inner">
            <div class="upload-left">
              <h2>Save</h2>
              <p class="upload-note">Upload your content here</p>
            </div>

            <div class="upload-center">
              <button class="upload-btn">Save Upload</button>
            </div>
          </div>
        </section>

        <!-- LOCKED CARD -->
        <section class="card locked-card">
          <div class="lock-wrap">
            <div class="lock-icon">🔒</div>
            <h3>Locked</h3>
            <p>Unlock after meeting the required threshold.</p>
          </div>
        </section>

      </main>
    </div>
  </div>
</body>
</html>
